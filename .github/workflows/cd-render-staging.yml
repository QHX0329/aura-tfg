name: CD Render Staging

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/cd-render-staging.yml'
  workflow_dispatch:

concurrency:
  group: cd-render-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy backend services to Render
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RENDER_API_URL: https://api.render.com/v1
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_WEB_SERVICE_ID: ${{ secrets.RENDER_WEB_SERVICE_ID }}
      RENDER_WORKER_SERVICE_ID: ${{ secrets.RENDER_WORKER_SERVICE_ID }}
      RENDER_BEAT_SERVICE_ID: ${{ secrets.RENDER_BEAT_SERVICE_ID }}
      RENDER_STAGING_HEALTHCHECK_URL: ${{ secrets.RENDER_STAGING_HEALTHCHECK_URL }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            RENDER_API_KEY
            RENDER_WEB_SERVICE_ID
            RENDER_WORKER_SERVICE_ID
            RENDER_BEAT_SERVICE_ID
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Trigger deploys and wait for live status
        shell: bash
        run: |
          set -euo pipefail

          auth_header="Authorization: Bearer ${RENDER_API_KEY}"

          json_get_string() {
            local payload="$1"
            local key="$2"

            python3 -c $'import json,sys\npayload=sys.argv[1]\nkey=sys.argv[2]\nif not payload.strip():\n    print("")\n    raise SystemExit(0)\ntry:\n    data=json.loads(payload)\nexcept json.JSONDecodeError:\n    print("")\n    raise SystemExit(0)\nif not isinstance(data, dict):\n    print("")\n    raise SystemExit(0)\nvalue=data.get(key, "")\nprint(value if isinstance(value, str) else "")' "${payload}" "${key}"
          }

          extract_first_deploy_id() {
            local payload="$1"

            python3 -c $'import json,sys\npayload=sys.argv[1]\nif not payload.strip():\n    print("")\n    raise SystemExit(0)\ntry:\n    data=json.loads(payload)\nexcept json.JSONDecodeError:\n    print("")\n    raise SystemExit(0)\ndef to_text(value):\n    if value is None:\n        return ""\n    if isinstance(value, (str, int, float)):\n        return str(value)\n    return ""\ndef from_deploy_dict(item):\n    if not isinstance(item, dict):\n        return ""\n    deploy_id=to_text(item.get("id"))\n    if deploy_id:\n        return deploy_id\n    nested=item.get("deploy")\n    if isinstance(nested, dict):\n        nested_id=to_text(nested.get("id"))\n        if nested_id:\n            return nested_id\n    return ""\ndef first_id_from_list(items):\n    if not isinstance(items, list):\n        return ""\n    for item in items:\n        candidate=from_deploy_dict(item)\n        if candidate:\n            return candidate\n    return ""\nif isinstance(data, dict):\n    deploy_id=from_deploy_dict(data)\n    if deploy_id:\n        print(deploy_id)\n        raise SystemExit(0)\n    for key in ("data", "items", "deploys", "results"):\n        from_list = first_id_from_list(data.get(key))\n        if from_list:\n            print(from_list)\n            raise SystemExit(0)\n    print("")\n    raise SystemExit(0)\nprint(first_id_from_list(data))' "${payload}"
          }

          lookup_latest_deploy_id() {
            local service_id="$1"
            local service_name="$2"
            local attempts=10
            local sleep_seconds=3

            for ((attempt=1; attempt<=attempts; attempt++)); do
              local latest_response
              latest_response=$(curl --silent --show-error --fail \
                --request GET \
                --url "${RENDER_API_URL}/services/${service_id}/deploys?limit=1" \
                --header "${auth_header}" \
                --header 'Accept: application/json')

              local deploy_id
              deploy_id=$(extract_first_deploy_id "${latest_response}")

              if [ -n "${deploy_id}" ]; then
                echo "${deploy_id}"
                return 0
              fi

              echo "No deploy id yet for ${service_name} (attempt ${attempt}/${attempts})." >&2
              echo "Latest deploy lookup response: ${latest_response}" >&2
              sleep "${sleep_seconds}"
            done

            return 1
          }

          trigger_deploy() {
            local service_id="$1"
            local service_name="$2"

            echo "Triggering deploy for ${service_name} (${service_id})..." >&2

            local response
            response=$(curl --silent --show-error --fail \
              --request POST \
              --url "${RENDER_API_URL}/services/${service_id}/deploys" \
              --header "${auth_header}" \
              --header 'Accept: application/json' \
              --header 'Content-Type: application/json' \
              --data '{}')

            local deploy_id
            deploy_id=$(json_get_string "${response}" "id")

            if [ -z "${deploy_id}" ]; then
              echo "No deploy id in trigger response for ${service_name}. Trying latest deploy lookup with retries..." >&2
              deploy_id=$(lookup_latest_deploy_id "${service_id}" "${service_name}" || true)
            fi

            if [ -z "${deploy_id}" ]; then
              echo "Could not extract deploy id for ${service_name}" >&2
              echo "Trigger response: ${response}" >&2
              exit 1
            fi

            echo "Deploy id for ${service_name}: ${deploy_id}" >&2
            echo "${deploy_id}"
          }

          wait_for_live() {
            local service_id="$1"
            local deploy_id="$2"
            local service_name="$3"
            local max_attempts=120
            local sleep_seconds=15

            echo "Waiting for ${service_name} deploy ${deploy_id} to reach live status..."

            for ((attempt=1; attempt<=max_attempts; attempt++)); do
              local response
              response=$(curl --silent --show-error --fail \
                --request GET \
                --url "${RENDER_API_URL}/services/${service_id}/deploys/${deploy_id}" \
                --header "${auth_header}" \
                --header 'Accept: application/json')

              local status
              status=$(json_get_string "${response}" "status")

              if [ -z "${status}" ]; then
                echo "${service_name}: could not parse deploy status from response." >&2
                echo "Deploy payload: ${response}" >&2
                return 1
              fi

              echo "${service_name}: attempt ${attempt}/${max_attempts} status=${status}"

              case "${status}" in
                live)
                  echo "${service_name} is live."
                  return 0
                  ;;
                build_failed|update_failed|failed|canceled)
                  echo "${service_name} deploy failed with status=${status}"
                  echo "Deploy payload: ${response}"
                  return 1
                  ;;
              esac

              sleep "${sleep_seconds}"
            done

            echo "Timeout waiting for ${service_name} deploy ${deploy_id}"
            return 1
          }

          web_deploy_id=$(trigger_deploy "${RENDER_WEB_SERVICE_ID}" "web")
          wait_for_live "${RENDER_WEB_SERVICE_ID}" "${web_deploy_id}" "web"

          worker_deploy_id=$(trigger_deploy "${RENDER_WORKER_SERVICE_ID}" "worker")
          wait_for_live "${RENDER_WORKER_SERVICE_ID}" "${worker_deploy_id}" "worker"

          beat_deploy_id=$(trigger_deploy "${RENDER_BEAT_SERVICE_ID}" "beat")
          wait_for_live "${RENDER_BEAT_SERVICE_ID}" "${beat_deploy_id}" "beat"

      - name: Smoke check API health endpoint
        if: ${{ env.RENDER_STAGING_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Running health check against ${RENDER_STAGING_HEALTHCHECK_URL}"

          for attempt in {1..20}; do
            if curl --silent --show-error --fail "${RENDER_STAGING_HEALTHCHECK_URL}" > health.json; then
              echo "Health check passed on attempt ${attempt}."
              cat health.json
              exit 0
            fi

            echo "Health check failed on attempt ${attempt}, retrying..."
            sleep 10
          done

          echo "Health check did not pass in time."
          exit 1

      - name: Smoke check skipped
        if: ${{ env.RENDER_STAGING_HEALTHCHECK_URL == '' }}
        run: echo "RENDER_STAGING_HEALTHCHECK_URL is not configured, skipping smoke check."
